{% extends "recipes/base.html" %}
<!-- -->
{% load crispy_forms_tags %}
<!-- -->
{% block content %}
<div class="form-container">

  <h1>{{ user.username }}'s Profile</h1>

  <form method="POST">
    {% csrf_token %}

    {{ form|crispy }}

    <button type="submit" class="btn btn-primary">
      Update Profile
    </button>

  </form>

</div>
{% endblock content %}
